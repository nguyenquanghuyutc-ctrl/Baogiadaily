<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Viewer</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>

<body>

  <iframe
    src="https://drive.google.com/file/d/1M4p3tg2sDkdU_DuW5RGi50BIjKhvCVLn/preview"
    allow="autoplay"
    allowfullscreen>
  </iframe>

</body>
</html>
